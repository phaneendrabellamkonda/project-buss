    <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOOK TOUR NEXT</title>
</head>
<body>
   <center> <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRF2p2niOvqOY74sDZy-YoxyTdjWsYQ_XEpNQ&s" alt="logo"></center>
        <center><h3>TELANGANA ROAD TRANSPORT CORPORATION</h3></center>
        <CEnter><h5>GENERAL BUS PASS APPLICATION</h5></CEnter>
                        <fieldset>
                <legend><b>Applicant Details</b></legend>
        <table>
            <form action="">

                <tr>
                    <td>
                        <label for="a">Name *</label>
                        <input type="text" id="a" name="name" placeholder="user name" maxlength="20" title="maximum characters : 20">
                    </td>
                    <td>
                        <label for="b">Father/ Guardian's Name *</label>
                        <input type="text" id="b" name="fname">
                    </td>
                </tr>
                <tr>
                    <td>
                    <label for="c">Date of barth *</label>
                    <input type="date" id="c" name="dob">
                    </td>
                    <td>
                        <label for="">Gender *</label>
                        <input type="radio" id="d" name="gender" value="male">
                        <label for="d">female</label>
                        <input type="radio" id="e" name="gender" value="female">
                        <label for="e">male</label>
                    </td>
                </tr>
                <tr>
                    <td>
                        <label for="f">Age As On :</label>
                        <input type="text" name="year's" value="year's"  size="2" id="f">
                        <input type="text" name="Month(s)" value="months" size="2" id="f">
                        <input type="text" name="Day's" value="days" size="2" id="f">

                    </td> 
                    <td>
                        <label for="g">Aadhaaar No :</label>
                        <input type="number" id="g" name="aadhar" value="aadhar" maxlength="12" required>
                    </td>
                </tr>
                <tr>
                    <td>
                        <label for="h">WhatsApp No *</label>
                        <input type="tel" name="number" id="g" pattern="">
                    </td>
                    <td>
                        <label for="i">E-Mail ID</label>
                        <input type="email" name="mail" value="email" id="i" pattern="gmail\.com">

                    </td>
                </tr>
                <tr>
                    <td>
                        <label for="j">Photo :</label>
                        <input type="file" id="j" name="ima" value="image">
                    </td>
                </tr>
            </form>
        </table>
    </fieldset>
    <fieldset>
        <legend><b>Residential Addtress Details</b></legend>
        <table>
            <tr>
                <td>
                    <label for="j">Applicant's Addresss * :</label>
                    <textarea name="address" id="j" placeholder="Enter present address" cols="50" rows="6" title="maximum characters:"></textarea>
                </td>
                <td>
                    <label for="k">District *</label>
                    <select name="dis" id="k">
                    <option value="">Select Dis</option>
                    <option value="hyd">hyd</option>
                    <option value="warangal">warangal</option>
                    <option value="rangareddy">rangareddy</option>
                    </select>
                </td>
            </tr>
            <tr>
                <td>
                    <label for="l">Mandal *</label>
                    <select name="mandal" id="l">
                        <option value="">-----select mandal-----</option>
                        <option value="hyd">hyd</option>
                        <option value="war">war</option>
                    </select>
                </td>
            </tr>
            <tr>
                <td>
                    <label for="m">Pincode *</label>
                    <input type="tel" id="m" name="pin">
                </td>
            </tr>
        </table>
    </fieldset>
    <fieldset>
        <legend> <b>Pass Type Details</b></legend>
        <table>
            <tr>
                <td>
                    <label for="n">City : *</label>
                    <select name="city" id="n">
                        <option value="">------select city-----</option>
                        <option value="hyd">hyd</option>
                    </select>
                </td>
            </tr>
            <tr>
                <td>
                    <label for="o">Pass Type :>*</label>
                    <select name="pass type" id="o">
                        <option value="">-----select pass-----</option>
                        <option value="gen">gen</option>
                        <option value="senior pass">senior pass</option>
                        <option value="girls">girls</option>
                        <option value="student">student pass</option>
                    </select>
                </td>
            </tr>
        </table>
 
    </fieldset>
    <fieldset>
        <legend><b>Mode Of Payment & Pass Collection</b></legend>
        <table>
            <tr>
                <td>
                    <label for="P">Paymet mode : *</label>
                    <select name="pay" id="p">
                        <option value="">---payment---</option>
                        <option value="net banking">net banking</option>
                        <option value="UPI">UPI</option>
                        <option value="card">card</option>
                        <option value="offline">offline</option>
                    </select>
                </td>
            </tr>
            <tr>
                <td>
                    <label for="q">Pass Delivery Mode :*</label>
                    <select name="delivery" id="q">
                        <option value="">---select---</option>
                        <option value="post">post</option>
                        <option value="at court">at court</option>
                    </select>
                </td>
            </tr>
            <tr>
                <td>
                    <label for="r">Center at which you want to collect pass : *</label>
                    <select name="collect" id="r">
                        <option value="">---select ----</option>
                        <option value="Rtc HYD">Rtc HYD</option>
                        <option value="air port">air port</option>
                    </select>
                </td>
            </tr>
        </table>
    </fieldset>
    <center><img src="https://www.veerotech.net/kb/wp-content/uploads/2018/11/captcha.png.webp" alt="captcha"></center>
    <center><input type="text" placeholder="Enter captcha" name="captcha">
        <br>
    <button>submit</button></center>
    <br>
    <hr>
</body>
</html>
</body>
